backend:
  name: github
  repo: YOUR_GITHUB_USERNAME/itsalamute
  branch: main

media_folder: "src/images/uploads"
public_folder: "/images/uploads"

locale: "it"

collections:
  # ─── ITALIANO ────────────────────────────────────────────────
  - name: "it_razza"
    label: "🇮🇹 La Razza"
    folder: "src/it/la-razza"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Titolo", name: "title", widget: "string" }
      - { label: "Data", name: "date", widget: "datetime" }
      - { label: "Immagine copertina", name: "cover", widget: "image", required: false }
      - { label: "Descrizione (SEO)", name: "description", widget: "text" }
      - { label: "In evidenza?", name: "featured", widget: "boolean", default: false }
      - { label: "type", name: "type", widget: "hidden", default: "post" }
      - { label: "layout", name: "layout", widget: "hidden", default: "article-it.njk" }
      - { label: "Contenuto", name: "body", widget: "markdown" }

